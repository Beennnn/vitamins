<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="vitamins icon">
  <defs>
    <linearGradient id="orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB55A"/>
      <stop offset="100%" stop-color="#EE7B00"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5BC3B6"/>
      <stop offset="100%" stop-color="#2A8F86"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFCF3"/>
      <stop offset="100%" stop-color="#FFE9C2"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- soft round background -->
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#bgGlow)" stroke="#E5D5A5" stroke-width="3"/>

  <!-- main capsule, rotated -->
  <g transform="translate(128 128) rotate(-30)" filter="url(#softShadow)">
    <rect x="-72" y="-30" width="144" height="60" rx="30" ry="30" fill="url(#orange)"/>
    <rect x="-72" y="-30" width="72" height="60" rx="30" ry="30" fill="url(#teal)"/>
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#FFFFFF" stroke-width="1.2" opacity="0.4"/>
    <ellipse cx="-46" cy="-15" rx="20" ry="6" fill="#FFFFFF" opacity="0.5"/>
    <ellipse cx="38" cy="-15" rx="22" ry="5" fill="#FFFFFF" opacity="0.35"/>
  </g>

  <!-- small accent capsule (background, decorative) -->
  <g transform="translate(190 60) rotate(40)" opacity="0.55">
    <rect x="-22" y="-9" width="44" height="18" rx="9" ry="9" fill="url(#teal)"/>
    <rect x="-22" y="-9" width="22" height="18" rx="9" ry="9" fill="url(#orange)"/>
  </g>
  <g transform="translate(60 200) rotate(-20)" opacity="0.45">
    <rect x="-18" y="-7" width="36" height="14" rx="7" ry="7" fill="url(#orange)"/>
    <rect x="-18" y="-7" width="18" height="14" rx="7" ry="7" fill="url(#teal)"/>
  </g>
</svg>
